<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral Terbaru</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    max-width:420px;
    width:100%;
    text-align:center;
}

.card{
    background:#1a1a1a;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,255,255,.08);
}

.thumbnail{
    position:relative;
    display:block;
    cursor:pointer;
    overflow:hidden;
}

.thumbnail img{
    width:100%;
    height:550px;
    object-fit:cover;
    display:block;
}

.thumbnail:hover{
    opacity:0.9;
    transform:scale(1.01);
    transition:0.3s;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    background:rgba(255,0,0,.95);
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

.play:before{
    content:"";
    position:absolute;
    top:50%;
    left:55%;
    transform:translate(-50%,-50%);
    border-left:28px solid white;
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

.content{
    padding:25px;
}

.badge{
    display:inline-block;
    background:#ff0000;
    padding:6px 14px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
    margin-bottom:15px;
}

h1{
    font-size:26px;
    margin-bottom:10px;
}

p{
    color:#bdbdbd;
    line-height:1.5;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
}

.stats div{
    font-size:14px;
}

.stats strong{
    display:block;
    font-size:20px;
    color:#fff;
}

.btn{
    display:block;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    padding:16px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.note{
    margin-top:15px;
    color:#888;
    font-size:12px;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <a href="https://agitationmedicdrug.com/mkxvi1dzhv?key=0b4e48058669e7958151b797b10ec6fd" class="thumbnail">
            <img src="poto2.jpg" alt="Thumbnail">
            <div class="play"></div>
        </a>

        <div class="content">

            <span class="badge">🔥 TRENDING</span>

            <h1>Video Viral Hari Ini</h1>

            <p>
                Ribuan orang telah menonton video yang sedang ramai dibahas.
                Klik tombol di bawah untuk melihat selengkapnya.
            </p>

            <div class="stats">
                <div>
                    <strong>25K+</strong>
                    Penonton
                </div>

                <div>
                    <strong>4.9★</strong>
                    Rating
                </div>

                <div>
                    <strong>2026</strong>
                    Update
                </div>
            </div>

            <a href="https://agitationmedicdrug.com/mkxvi1dzhv?key=0b4e48058669e7958151b797b10ec6fd" class="btn">
                ▶ TONTON SEKARANG
            </a>

            <div class="note">
                Akses tersedia untuk waktu terbatas.
            </div>

        </div>

    </div>

</div>

</body>
</html>
